<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 天空蓝渐变 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
    <!-- 云朵投影 -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="230" fill="url(#skyGradient)"/>
  
  <!-- 太阳光（从云后透出） -->
  <circle cx="750" cy="280" r="100" fill="#FFD700" opacity="0.6"/>
  <g stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.5">
    <line x1="750" y1="130" x2="750" y2="80"/>
    <line x1="850" y1="180" x2="890" y2="140"/>
    <line x1="900" y1="280" x2="950" y2="280"/>
  </g>
  
  <!-- 主云朵 -->
  <g fill="white" filter="url(#cloudShadow)">
    <circle cx="350" cy="550" r="100"/>
    <circle cx="512" cy="520" r="130"/>
    <circle cx="674" cy="550" r="100"/>
    <rect x="350" y="550" width="324" height="100" rx="50"/>
  </g>
  
  <!-- 小云朵 -->
  <g fill="white" opacity="0.7" filter="url(#cloudShadow)">
    <circle cx="200" cy="650" r="60"/>
    <circle cx="280" cy="640" r="75"/>
    <circle cx="360" cy="650" r="60"/>
    <rect x="200" y="650" width="160" height="65" rx="32"/>
  </g>
</svg>