<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 温度渐变环 -->
    <linearGradient id="tempGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FFE66D"/>
      <stop offset="100%" style="stop-color:#4ECDC4"/>
    </linearGradient>
    <!-- 投影 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 白色背景 -->
  <rect width="1024" height="1024" rx="230" fill="#F8F9FA"/>
  
  <!-- 温度圆环 -->
  <circle cx="512" cy="512" r="320" 
          fill="none" 
          stroke="url(#tempGradient)" 
          stroke-width="60"
          filter="url(#dropShadow)"/>
  
  <!-- 中心温度符号 -->
  <text x="512" y="560" 
        font-family="-apple-system, SF Pro Rounded, sans-serif" 
        font-size="280" 
        font-weight="600" 
        fill="#2C3E50" 
        text-anchor="middle">°</text>
  
  <!-- 刻度点装饰 -->
  <g fill="#CBD5E0">
    <circle cx="512" cy="120" r="15"/>
    <circle cx="512" cy="904" r="15"/>
    <circle cx="120" cy="512" r="15"/>
    <circle cx="904" cy="512" r="15"/>
  </g>
</svg>