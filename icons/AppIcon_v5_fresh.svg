<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 清新渐变 -->
    <linearGradient id="freshGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56CCF2"/>
      <stop offset="100%" style="stop-color:#2F80ED"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="230" fill="url(#freshGradient)"/>
  
  <!-- 太阳 -->
  <circle cx="720" cy="320" r="100" fill="#FFD93D"/>
  <g stroke="#FFD93D" stroke-width="16" stroke-linecap="round">
    <line x1="720" y1="170" x2="720" y2="130"/>
    <line x1="870" y1="320" x2="910" y2="320"/>
    <line x1="820" y1="220" x2="850" y2="190"/>
    <line x1="820" y1="420" x2="850" y2="450"/>
  </g>
  
  <!-- 雨滴 -->
  <g fill="white" opacity="0.9">
    <ellipse cx="300" cy="600" rx="20" ry="35"/>
    <ellipse cx="400" cy="700" rx="20" ry="35"/>
    <ellipse cx="500" cy="580" rx="20" ry="35"/>
    <ellipse cx="600" cy="720" rx="20" ry="35"/>
  </g>
  
  <!-- 彩虹弧线 -->
  <path d="M 200 750 Q 512 450 824 750" 
        fill="none" 
        stroke="white" 
        stroke-width="20" 
        stroke-linecap="round"
        opacity="0.3"/>
</svg>